# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = ["exec-and-forget borders",
                         "exec-and-forget open -j /Applications/Thunderbird.app/"]

start-at-login = true

# See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 20

# Possible values: tiles|accordion
default-root-container-layout = "tiles"

# Possible values: horizontal|vertical|auto
# "auto" means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = "auto"

on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]
on-focus-changed = "move-mouse window-lazy-center"

# Useful if you don"t use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
automatically-unhide-macos-hidden-apps = false

[key-mapping]
    preset = "dvorak"

[gaps]
    inner.horizontal = 6
    inner.vertical =   6
    outer.left =       6
    outer.bottom =     6
    outer.top =        6
    outer.right =      6

[mode.main.binding]
    # Possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # Modifiers: cmd, alt, ctrl, shift

    alt-shift-comma = "layout tiles horizontal vertical"
    alt-shift-period = "layout accordion horizontal vertical"

    alt-shift-h = "focus left"
    alt-shift-j = "focus down"
    alt-shift-k = "focus up"
    alt-shift-l = "focus right"

    alt-shift-ctrl-h = "move left"
    alt-shift-ctrl-j = "move down"
    alt-shift-ctrl-k = "move up"
    alt-shift-ctrl-l = "move right"

    alt-shift-minus = "resize smart -50"
    alt-shift-equal = "resize smart +50"

    alt-shift-1 = "workspace 1"
    alt-shift-2 = "workspace 2"
    alt-shift-3 = "workspace 3"
    alt-shift-4 = "workspace 4"
    alt-shift-5 = "workspace 5"
    alt-shift-6 = "workspace 6"
    alt-shift-7 = "workspace 7"
    alt-shift-8 = "workspace 8"
    alt-shift-9 = "workspace 9"
    alt-shift-b = "workspace B"
    alt-shift-s = "workspace S"
    alt-shift-t = "workspace T"
    alt-shift-u = "workspace U"

    alt-shift-m = "fullscreen"

    alt-shift-ctrl-1 = "move-node-to-workspace 1"
    alt-shift-ctrl-2 = "move-node-to-workspace 2"
    alt-shift-ctrl-3 = "move-node-to-workspace 3"
    alt-shift-ctrl-4 = "move-node-to-workspace 4"
    alt-shift-ctrl-5 = "move-node-to-workspace 5"
    alt-shift-ctrl-6 = "move-node-to-workspace 6"
    alt-shift-ctrl-7 = "move-node-to-workspace 7"
    alt-shift-ctrl-8 = "move-node-to-workspace 8"
    alt-shift-ctrl-9 = "move-node-to-workspace 9"
    alt-shift-ctrl-b = "move-node-to-workspace B"
    alt-shift-ctrl-s = "move-node-to-workspace S"
    alt-shift-ctrl-t = "move-node-to-workspace T"
    alt-shift-ctrl-u = "move-node-to-workspace U"

    alt-shift-slash = "workspace-back-and-forth"

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-shift-space = "mode service"

# "service" binding mode declaration. (there are other modes, have a look at the docs)
[mode.service.binding]
    esc = ["reload-config", "mode main"]
    r = ["flatten-workspace-tree", "mode main"] # reset layout
    f = ["layout floating tiling", "mode main"] # Toggle between floating and tiling layout

    alt-shift-h = ["join-with left", "mode main"]
    alt-shift-j = ["join-with down", "mode main"]
    alt-shift-k = ["join-with up", "mode main"]
    alt-shift-l = ["join-with right", "mode main"]

    down = "volume down"
    up = "volume up"

# CALLBACKS, use: aerospace list-apps, to know the ids of the apps running
[[on-window-detected]]
if.app-name-regex-substring = "Alacritty"
run = "move-node-to-workspace T"

[[on-window-detected]]
if.app-name-regex-substring = "Ghostty"
run = "move-node-to-workspace T"

[[on-window-detected]]
if.app-name-regex-substring = "LibreWolf"
run = "move-node-to-workspace B"

[[on-window-detected]]
if.app-id = "org.mozilla.thunderbird"
run = "move-node-to-workspace U"

[[on-window-detected]]
if.app-name-regex-substring = "Skim"
run = "move-node-to-workspace S"

[[on-window-detected]]
if.app-id = "com.spotify.client"
run = ["layout floating","move-node-to-workspace U"]

[[on-window-detected]]
if.app-name-regex-substring = "finder"
run = "layout floating"

[[on-window-detected]]
if.app-name-regex-substring = "Zotero"
run = "layout floating"

[[on-window-detected]]
# to have ROOT plots floating
if.app-name-regex-substring = "root"
run = "layout floating"

[[on-window-detected]]
# to have Python plots floating
if.app-name-regex-substring = "python"
run = "layout floating"

[[on-window-detected]]
if.app-name-regex-substring = "LaTeXiT"
run = "layout floating"
